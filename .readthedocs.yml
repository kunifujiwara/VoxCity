# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py

formats:
  - pdf
  - epub

# Install the voxcity package (path: .) so autodoc/autoapi and any imports
# resolve, then the documentation-only requirements. Keeping the package
# install here (instead of "-e ." in docs/requirements.txt) lets Dependabot
# scan docs/requirements.txt without hitting an unresolvable path dependency.
python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt